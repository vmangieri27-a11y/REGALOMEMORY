<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PER TE ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Press Start 2P', cursive;
  background: linear-gradient(135deg, #140000, #2a000f);
  color: white;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 1px,
    transparent 2px,
    transparent 4px
  );
  pointer-events: none;
}

.screen {
  display: none;
  height: 100vh;
  width: 100vw;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

.active { display: flex; }

h1 {
  font-size: 14px;
  text-shadow: 0 0 15px #ff4d6d;
  line-height: 1.8;
}

/* BOTTONI */
button {
  font-family: 'Press Start 2P', cursive;
  background: black;
  border: 2px solid #ff4d6d;
  color: white;
  padding: 12px;
  margin-top: 15px;
}

/* GIF */
.gif {
  width: 140px;
  margin: 15px;
}

/* ICON */
.icon {
  width: 90px;
  margin: 10px;
  cursor: pointer;
}

/* MEMORY */
.board {
  display: grid;
  grid-template-columns: repeat(3, 80px);
  gap: 10px;
  margin-top: 20px;
}

.card {
  width: 80px;
  height: 80px;
  border: 2px solid #ff4d6d;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  cursor: pointer;
  background: black;
}

/* POPUP */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: black;
  border: 2px solid #ff4d6d;
  padding: 20px;
  display: none;
  text-align: center;
  z-index: 10;
}

.popup img {
  max-width: 220px;
  border: 2px solid white;
}
</style>
</head>

<body>

<!-- SCHERMATA 1 -->
<div class="screen active" id="s1">
  <img class="gif" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">
  <h1>VUOI APRIRE IL REGALO?</h1>
  <button onclick="next(2)">SI ❤️</button>
</div>

<!-- SCHERMATA 2 -->
<div class="screen" id="s2">
  <img class="gif" src="https://media.giphy.com/media/3oriO6qJiXajN0TyDu/giphy.gif">
  <h1>TI PROMETTO CHE TI PIACERÀ 💕</h1>
  <button onclick="next(3)">INIZIA IL GIOCO 🎮</button>
</div>

<!-- MEMORY -->
<div class="screen" id="s3">

  <h1>MEMORY LEVEL 🎮</h1>
  <p>Trova tutte le coppie 💕</p>

  <div class="board" id="board"></div>

</div>

<!-- REGALI -->
<div class="screen" id="s4">

  <h1>QUESTI SONO PER TE! 💝</h1>

  <div onclick="music()">
    <img class="icon" src="https://media.giphy.com/media/13borq7Zo2kulO/giphy.gif">
    <p>Canzone 🎵</p>
  </div>

  <div onclick="photo()">
    <img class="icon" src="https://media.giphy.com/media/26AHONQ79FdWZhAI0/giphy.gif">
    <p>Foto 📸</p>
  </div>

  <div onclick="gift()">
    <img class="icon" src="https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif">
    <p>Regalo 🎁</p>
  </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div id="content"></div>
  <button onclick="closeP()">CHIUDI</button>
</div>

<script>

let flipped = [];
let matched = 0;

const emojis = ["💖","🎵","🎁","💖","🎵","🎁"];

function next(n){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');

  if(n === 3) startGame();
}

function startGame(){
  const board = document.getElementById("board");
  board.innerHTML = "";

  let shuffled = emojis.sort(() => Math.random() - 0.5);

  shuffled.forEach(e => {
    let card = document.createElement("div");
    card.className = "card";
    card.dataset.value = e;
    card.textContent = "❓";

    card.onclick = () => flip(card);

    board.appendChild(card);
  });
}

function flip(card){
  if(card.textContent !== "❓" || flipped.length === 2) return;

  card.textContent = card.dataset.value;
  flipped.push(card);

  if(flipped.length === 2){
    setTimeout(check, 600);
  }
}

function check(){
  if(flipped[0].dataset.value === flipped[1].dataset.value){
    matched++;
  } else {
    flipped[0].textContent = "❓";
    flipped[1].textContent = "❓";
  }

  flipped = [];

  if(matched === 3){
    setTimeout(() => next(4), 800);
  }
}

function photo(){
  document.getElementById("content").innerHTML =
    "<div>RICORDO 💕</div><img src='foto_coppia.JPG'>";
  document.getElementById("popup").style.display = "block";
}

function gift(){
  document.getElementById("content").innerHTML =
    "<div>REGALO 🎁</div><div style='color:#ff4d6d'>LEZIONE DI TENNIS 🎾</div>";
  document.getElementById("popup").style.display = "block";
}

function music(){
  window.open("https://www.youtube.com/watch?v=tTX6sJeZcmI", "_blank");
}

function closeP(){
  document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
