<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PER TE ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Press Start 2P', cursive;
  background: linear-gradient(135deg, #120000, #2a0010);
  color: white;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 1px,
    transparent 2px,
    transparent 4px
  );
  pointer-events: none;
}

.screen {
  display: none;
  height: 100vh;
  width: 100vw;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

.active { display: flex; }

h1 {
  font-size: 14px;
  text-shadow: 0 0 15px #ff4d6d;
  line-height: 1.8;
}

p {
  font-size: 10px;
  color: #ffb3c6;
}

/* ICONE SICURE (INLINE SVG STYLE) */
.icon {
  width: 70px;
  height: 70px;
  margin: 10px;
  filter: drop-shadow(0 0 6px #ff4d6d);
  cursor: pointer;
}

/* MEMORY */
.board {
  display: grid;
  grid-template-columns: repeat(3, 80px);
  gap: 10px;
  margin-top: 20px;
}

.card {
  width: 80px;
  height: 80px;
  border: 2px solid #ff4d6d;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  background: black;
  cursor: pointer;
  user-select: none;
}

.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: black;
  border: 2px solid #ff4d6d;
  padding: 20px;
  display: none;
  text-align: center;
  z-index: 10;
}

.popup img {
  max-width: 240px;
  border: 2px solid white;
  margin-top: 10px;
}

button {
  font-family: 'Press Start 2P', cursive;
  background: black;
  border: 2px solid #ff4d6d;
  color: white;
  padding: 12px;
  margin-top: 15px;
}
</style>
</head>

<body>

<!-- 1 -->
<div class="screen active" id="s1">
  <h1>VUOI APRIRE IL REGALO?</h1>
  <button onclick="next(2)">SI ❤️</button>
</div>

<!-- 2 -->
<div class="screen" id="s2">
  <h1>TI PROMETTO CHE TI PIACERÀ 💕</h1>
  <button onclick="next(3)">INIZIA 🎮</button>
</div>

<!-- MEMORY -->
<div class="screen" id="s3">
  <h1>MEMORY 🎮</h1>
  <p>Trova tutte le coppie 💕</p>
  <div class="board" id="board"></div>
</div>

<!-- REGALO -->
<div class="screen" id="s4">

  <h1>QUESTI SONO PER TE 💝</h1>

  <!-- MUSICA -->
  <div onclick="music()">
    <svg class="icon" viewBox="0 0 24 24" fill="white">
      <path d="M12 3v10.55a4 4 0 1 0 2 3.45V7h4V3h-6z"/>
    </svg>
    <p>Canzone che mi ricorda di te 🎵</p>
  </div>

  <!-- FOTO -->
  <div onclick="photo()">
    <svg class="icon" viewBox="0 0 24 24" fill="white">
      <path d="M9 2l1.5 2H20a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h3.5L9 2zm3 5a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"/>
    </svg>
    <p>Foto Preferita 📸</p>
  </div>

  <!-- REGALO -->
  <div onclick="gift()">
    <svg class="icon" viewBox="0 0 24 24" fill="white">
      <path d="M20 7h-3.17A3 3 0 0 0 12 3a3 3 0 0 0-4.83 4H4v4h16V7zm-9-2a1 1 0 1 1 2 0 1 1 0 0 1-2 0zm-7 6v9a2 2 0 0 0 2 2h5V11H4zm10 11h5a2 2 0 0 0 2-2v-9h-7v11z"/>
    </svg>
    <p>Il tuo regalo 🎁</p>
  </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div id="content"></div>
  <button onclick="closeP()">CHIUDI</button>
</div>

<script>

let flipped = [];
let matched = 0;

const emojis = ["💖","🎵","🎁","💖","🎵","🎁"];

/* NAV */
function next(n){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');

  if(n === 3){
    setTimeout(startGame, 300);
  }
}

/* MEMORY */
function startGame(){
  const board = document.getElementById("board");
  board.innerHTML = "";

  matched = 0;
  flipped = [];

  let shuffled = [...emojis].sort(() => Math.random() - 0.5);

  shuffled.forEach(e => {
    let card = document.createElement("div");
    card.className = "card";
    card.textContent = "❓";
    card.dataset.value = e;

    card.onclick = () => flip(card);

    board.appendChild(card);
  });
}

function flip(card){
  if(card.textContent !== "❓" || flipped.length === 2) return;

  card.textContent = card.dataset.value;
  flipped.push(card);

  if(flipped.length === 2){
    setTimeout(check, 500);
  }
}

function check(){
  if(flipped[0].dataset.value === flipped[1].dataset.value){
    matched++;
  } else {
    flipped[0].textContent = "❓";
    flipped[1].textContent = "❓";
  }

  flipped = [];

  if(matched === 3){
    setTimeout(() => next(4), 700);
  }
}

/* MUSICA */
function music(){
  window.open("https://www.youtube.com/watch?v=tTX6sJeZcmI", "_blank");
}

/* FOTO */
function photo(){
  document.getElementById("content").innerHTML =
    "<div>Foto Preferita 💕</div><img src='foto_coppia.JPG'>";
  document.getElementById("popup").style.display = "block";
}

/* REGALO */
function gift(){
  document.getElementById("content").innerHTML =
    `
    <div style="font-size:12px;margin-bottom:10px;">
      REGALO PER TE:
    </div>

    <div style="color:#ff4d6d;margin-bottom:10px;">
      LEZIONE DI TENNIS 🎾
    </div>

    <img src="IMG_3842.jpeg">
    `;

  document.getElementById("popup").style.display = "block";
}

/* CLOSE */
function closeP(){
  document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
